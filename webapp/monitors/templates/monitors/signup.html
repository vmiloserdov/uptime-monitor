{% extends 'monitors/base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h1>Sign Up</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color:red">{{ field.errors }}</p>
            {% endif %}
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
    </form>
    <p style="margin-top:1rem">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
