{% extends 'monitors/base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1>Add Monitor</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p style="color:red">{{ field.errors }}</p>{% endif %}
        {% endfor %}
        <button type="submit" class="btn btn-primary">Add Monitor</button>
        <a href="{% url 'dashboard' %}" class="btn" style="background:#eee">Cancel</a>
    </form>
</div>
{% endblock %}
